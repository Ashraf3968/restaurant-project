<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login or create an Aurelio House guest account.">
  <title>Login / Sign Up | Aurelio House</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body data-page="auth" class="auth-page">
  <div id="site-header"></div>
  <main class="auth-shell">
    <section class="auth-split"><div class="auth-brand reveal"><span class="eyebrow">Guest access</span><h1>Join the house list for reservations, offers, and priority nights.</h1><p>Create an account to manage upcoming bookings, review your dining history, and access members-only experiences.</p><div class="auth-note"><strong>Admin demo login</strong><p>Email: admin@digitquo.com</p><p>Password: digitquo@123</p><a class="text-link" href="./admin.html">Open admin panel</a></div></div><div class="auth-card reveal"><div class="auth-tabs"><button class="auth-tab active" type="button" data-auth-tab="login">Login</button><button class="auth-tab" type="button" data-auth-tab="signup">Sign Up</button><button class="auth-tab" type="button" data-auth-tab="forgot">Forgot Password</button></div><form id="login-form" class="auth-form"><label>Email<input type="email" name="email" required></label><label>Password<div class="password-field"><input type="password" name="password" required><button class="password-toggle" type="button">Show</button></div></label><label class="checkbox-row"><input type="checkbox" name="remember"><span>Remember me</span></label><button class="btn btn-primary" type="submit">Login</button><div class="social-auth"><button type="button" class="btn btn-social">Continue with Google</button><button type="button" class="btn btn-social">Continue with Apple</button></div><p id="login-feedback" class="form-feedback"></p></form><form id="signup-form" class="auth-form hidden"><div class="form-grid two"><label>First name<input type="text" name="firstName" required></label><label>Last name<input type="text" name="lastName" required></label></div><label>Email<input type="email" name="email" required></label><label>Phone<input type="tel" name="phone" required></label><label>Password<div class="password-field"><input type="password" name="password" minlength="8" required><button class="password-toggle" type="button">Show</button></div></label><button class="btn btn-primary" type="submit">Create Account</button><p id="signup-feedback" class="form-feedback"></p></form><form id="forgot-form" class="auth-form hidden"><label>Email<input type="email" name="email" required></label><button class="btn btn-primary" type="submit">Send Reset Link</button><p id="forgot-feedback" class="form-feedback"></p></form></div></section>
  </main>
  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
