<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse the Aurelio House menu with category filters, dietary tags, chef recommendations, and live search.">
  <title>Menu | Aurelio House</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body data-page="menu">
  <div id="site-header"></div>
  <main>
    <section class="page-hero"><div class="shell reveal"><span class="eyebrow">Seasonal Menu</span><h1>Refined plates built around fire, acidity, and market-led produce.</h1><p>Search the menu, browse by course, and discover chef-recommended dishes curated for elegant dining.</p></div></section>
    <section class="section"><div class="shell"><div class="toolbar reveal"><div class="search-input"><input id="menu-search" type="search" placeholder="Search dishes, ingredients, or tags"></div><div id="menu-filters" class="filter-group"></div></div><div id="menu-skeletons" class="grid cards-grid three-up"></div><div id="menu-grid" class="grid cards-grid three-up hidden"></div></div></section>
  </main>
  <div id="site-footer"></div>
  <button id="back-to-top" class="back-to-top" type="button" aria-label="Back to top">&#8593;</button>
  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
